name: Build and Cache

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  build-x86_64:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
        env:
          NIX_FIRST_BUILD_UID: 400

      - name: Setup Cachix
        if: github.ref == 'refs/heads/main'
        uses: cachix/cachix-action@v17
        with:
          name: hassiyyt
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Build donutbrowser
        run: nix build .#donutbrowser --print-build-logs

      - name: Push to Cachix
        if: github.ref == 'refs/heads/main'
        run: nix build .#donutbrowser --json | jq -r '.[].outputs.out' | cachix push hassiyyt

      - name: Smoke test under Xvfb
        run: |
          test -x ./result/bin/donutbrowser
          timeout 20s xvfb-run -a ./result/bin/donutbrowser >/tmp/donutbrowser.log 2>&1 || test $? -eq 124

  build-aarch64:
    runs-on: [ self-hosted, Linux, ARM64 ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - name: Setup Cachix
        if: github.ref == 'refs/heads/main'
        uses: cachix/cachix-action@v17
        with:
          name: hassiyyt
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Build donutbrowser
        run: nix build .#donutbrowser --print-build-logs

      - name: Push to Cachix
        if: github.ref == 'refs/heads/main'
        run: nix build .#donutbrowser --json | jq -r '.[].outputs.out' | cachix push hassiyyt
